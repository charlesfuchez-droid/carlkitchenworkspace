services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:v3.16.0
    container_name: mealie
    restart: always
    expose:
      - "9000"
    volumes:
      - mealie-data:/app/data/
      - ./custom-brand/favicon.ico:/opt/mealie/lib/python3.12/site-packages/mealie/frontend/favicon.ico:ro
    environment:
      ALLOW_SIGNUP: "false"
      PUID: 1000
      PGID: 1000
      TZ: Europe/Paris
      BASE_URL: http://kitchen.localhost

  caddy:
    image: caddy:2
    container_name: mealie-caddy
    restart: always
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - mealie

volumes:
  mealie-data:
  caddy-data:
  caddy-config: